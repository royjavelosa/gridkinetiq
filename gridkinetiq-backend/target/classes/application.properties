# Server
server.port=8080

# MongoDB Atlas - replace with your Atlas connection string
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017}
spring.data.mongodb.database=bess_operational

# CORS - allow GridKinetiq UI dev server
app.cors.allowed-origins=http://localhost:5173

# Simulator defaults
simulator.enabled=true
simulator.mode=STEADY
simulator.interval-ms=3000

# Logging
logging.level.com.bess=DEBUG
logging.level.org.springframework.data.mongodb=INFO
