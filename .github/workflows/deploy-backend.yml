name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - "gridkinetiq-backend/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "corretto"

      - name: Build JAR
        working-directory: gridkinetiq-backend
        run: mvn clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: gridkinetiq-backend/target/gridkinetiq-0.0.1-SNAPSHOT.jar
          target: /home/ec2-user/
          strip_components: 2

      - name: Restart app on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            pkill -f "gridkinetiq-0.0.1-SNAPSHOT.jar" || true
            sleep 2
            nohup java -jar /home/ec2-user/gridkinetiq-0.0.1-SNAPSHOT.jar \
              --spring.data.mongodb.uri="${{ secrets.MONGODB_URI }}" \
              --app.cors.allowed-origins="${{ secrets.CORS_ORIGINS }}" \
              > /home/ec2-user/gridkinetiq.log 2>&1 &
            disown
            echo "App started"
